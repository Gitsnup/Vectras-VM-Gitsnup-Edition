name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ] # Runs automatically on push, plus manual dispatch
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: BuildAPK

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle' # Automatically caches gradle dependencies

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create google-services.json
      run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

    - name: Send Build Start Notification to Telegram
      uses: appleboy/telegram-action@master
      if: env.HAS_TELEGRAM == 'true'
      env:
        HAS_TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
      with:
        to: |
          ${{ secrets.TELEGRAM_CHAT_ID }}
          ${{ secrets.TELEGRAM_CHAT_ID_VEC }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          Building APK for Run ID: `${{ github.run_id }}`
          Please wait about 3-5 minutes.

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    # OPTIONAL BUT RECOMMENDED: Sign the release APK if you have secrets configured
    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      if: env.HAS_SIGNING == 'true'
      env:
        HAS_SIGNING: ${{ secrets.KEYSTORE != '' }}
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Debug APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: |
          app/build/outputs/apk/release/*-signed.apk
          app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

    - name: Upload APKs to Telegram
      uses: appleboy/telegram-action@master
      if: always() && secrets.TELEGRAM_BOT_TOKEN != ''
      with:
        to: |
          ${{ secrets.TELEGRAM_CHAT_ID }}
          ${{ secrets.TELEGRAM_CHAT_ID_VEC }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        document: app/build/outputs/apk/debug/app-debug.apk
        format: markdown
        message: |
         Built successfully.
          Note: This is an automated beta build from the repository.
          
          Explore beta releases here: [GitHub Releases](https://github.com/AnBui2004/Vectras-VM-Emu-Android/releases)
          *Run ID:* `${{ github.run_id }}`

    - name: Notify on Failure
      uses: appleboy/telegram-action@master
      if: failure() && secrets.TELEGRAM_BOT_TOKEN != ''
      with:
        to: |
          ${{ secrets.TELEGRAM_CHAT_ID }}
          ${{ secrets.TELEGRAM_CHAT_ID_VEC }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          Something went wrong and the APK file could not be compiled or uploaded.
          Run ID: ${{ github.run_id }}
