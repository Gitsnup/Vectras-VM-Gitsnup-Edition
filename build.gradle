// Top-level build file where you can add configuration options common to all sub-projects/modules.

tasks.register('clean', Delete) {
    delete layout.buildDirectory
}

ext {
    toolsVersion = findProperty('TOOLS_VERSION') ?: '35.0.0'
    compileApi    = (findProperty('COMPILE_API')  ?: '35').toInteger()
    targetApi     = (findProperty('TARGET_API')   ?: '28').toInteger()
    minApi        = (findProperty('MIN_API')       ?: '23').toInteger()
}
